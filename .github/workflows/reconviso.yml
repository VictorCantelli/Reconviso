name: Recon and OSINT from Main Domain

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Domain'
        required: true
        type: string
      scope:
        description: 'Scope (ex: *.example.com,example.com)'
        required: false
        default: ''
      stealth_level:
        description: 'Stealth Level'
        required: false
        type: choice:
          options: ['ultra', 'low', 'normal']
          default: 'low'

env:
  SCAN_ID: ${{ github.run_id }}
  MAX_RATE: ${{ 
    github.event.inputs.stealth_level == 'ultra' && '3' ||
    github.event.inputs.stealth_level == 'low' && '5' ||
    '15'
  }}
  THREADS: 1
  TIMEOUT: 8
  DELAY: 2

jobs:
  # 0. SETUP & VALIDATION
  setup:
    name: Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      domain: ${{ steps.extract.outputs.domain }}
      scope: ${{ steps.extract.outputs.scope }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Domain & Scope
        id: extract
        run: |
          Extrai domínio principal
          DOMAIN=$(echo "${{ env.TARGET_DOMAIN }}" | sed 's|https\?://||' | sed 's|/.*||' | head -1)
          SCOPE="${{ github.event.inputs.scope || '*.'$DOMAIN','$DOMAIN }}"
          
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "Target: $DOMAIN | Scope: $SCOPE"

  # 1. RECONHECIMENTO PASSIVO
  passive-recon:
    name: Passive - ${{ matrix.type }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        type: [subdomains, urls, dns, certs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Passive Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install github.com/lc/gau/v2/cmd/gau@latest
          go install github.com/tomnomnom/waybackurls@latest
          go install github.com/tomnomnom/unfurl@latest
          go install github.com/tomnomnom/anew@latest
          go install github.com/projectdiscovery/certspotter/cmd/certspotter@latest

      - name: Passive Recon
        run: |
          mkdir -p output/passive
          DOMAIN="${{ needs.setup.outputs.domain }}"
          
          case "${{ matrix.type }}" in
            "subdomains")
              subfinder -d $DOMAIN -silent -t 50 -o output/passive/subdomains.txt
              sort -u output/passive/subdomains.txt -o output/passive/subdomains.txt
              ;;
            "urls")
              gau --threads 5 --subs $DOMAIN > output/passive/urls.txt
              echo $DOMAIN | waybackurls >> output/passive/urls.txt
              cat output/passive/urls.txt | sort -u | \
                grep -E '\.(txt|xml|json|bak|old|backup|config)' > output/passive/urls_juicy.txt
              cat output/passive/urls.txt | unfurl paths | sort -u > output/passive/paths.txt
              cat output/passive/urls.txt | unfurl keys | sort -u > output/passive/params.txt
              ;;
            "dns")
              echo $DOMAIN | dnsx -silent -json -o output/passive/dns.json
              jq -r '.host' output/passive/dns.json | sort -u > output/passive/all-hosts.txt
              ;;
            "certs")
              certspotter -scope "${{ needs.setup.outputs.scope }}" | \
                grep -i "${{ needs.setup.outputs.domain }}" | sort -u > output/passive/certs.txt
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: passive-${{ matrix.type }}
          path: output/passive/

  # 2. RECONHECIMENTO ATIVO
  stealth-active:
    name: Stealth Active
    runs-on: ubuntu-latest
    needs: [setup, passive-recon]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Stealth Tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - uses: actions/download-artifact@v4
        with:
          name: passive-subdomains
          path: passive-subdomains/

      - name: Stealth HTTP Probing
        run: |
          mkdir -p output/active
          
          #STEALTH HTTPX
          cat passive-subdomains/subdomains.txt | head -1000 | httpx \
            -silent \
            -threads $THREADS \
            -rate-limit $MAX_RATE \
            -timeout $TIMEOUT \
            -delay $DELAY \
            -no-fallback \
            -sc -title \
            -json -o output/active/live.json

      - uses: actions/upload-artifact@v4
        with:
          name: stealth-active
          path: output/active/

  # 3. STEALTH VULN SCAN (CRÍTICO SOMENTE)
  stealth-vuln:
    name: Stealth Vuln Scan
    runs-on: ubuntu-latest
    needs: [stealth-active, passive-recon]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates

      - uses: actions/download-artifact@v4
        with:
          name: stealth-active
          path: stealth-active/

      - uses: actions/download-artifact@v4
        with:
          name: passive-subdomains
          path: passive-subdomains/

      - name: Stealth Nuclei Scan
        run: |
          mkdir -p output/vuln
          
          # Targets consolidados (apenas live)
          cat passive-subdomains/subdomains.txt > targets.txt
          cat stealth-active/live.json | jq -r '.url' >> targets.txt 2>/dev/null || true
          sort -u targets.txt -o targets.txt
          
          # NUCLEI STEALTH: SOMENTE CRÍTICO/MÉDIO + HEADERS
          nuclei -l targets.txt \
            -tags misconfiguration,http-headers,cve,file,exposure \
            -severity medium,high,critical \
            -c $THREADS \
            -rl $MAX_RATE \
            -timeout $TIMEOUT \
            -headless \
            -silent \
            -jsonl -o output/vuln/nuclei.jsonl

      - uses: actions/upload-artifact@v4
        with:
          name: stealth-vuln
          path: output/vuln/

  # 4. REPORT
  stealth-report:
    name: Stealth Report
    runs-on: ubuntu-latest
    needs: [stealth-vuln, passive-recon, stealth-active]
    steps:
      - name: Download All Stealth Results
        uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: true

      - name: Generate Stealth Report
        run: |
          mkdir -p stealth-report
          DOMAIN="${{ needs.setup.outputs.domain }}"
          
          # REPORT MÍNIMO E LIMPO
          cat > stealth-report/STEALTH-RECON.md << EOF
# STEALTH RECON REPORT
**Target:** $DOMAIN 
**Stealth:** ${{ github.event.inputs.stealth_level || 'low' }} 
**Rate:** $MAX_RATE req/s 
**Scan:** $SCAN_ID

## FINDINGS

EOF

          # Stats silenciosos
          SUBS=\$(find results/ -name "*subdomains*" -exec cat {} + 2>/dev/null | wc -l)
          LIVE=\$(cat results/*/live.json 2>/dev/null | jq length 2>/dev/null || echo 0)
          VULN=\$(cat results/*/nuclei.jsonl 2>/dev/null | wc -l)
          
          cat >> stealth-report/STEALTH-RECON.md << EOF
**Subdomains:** \$SUBS | **Live:** \$LIVE | **Vulns:** \$VULN

## CRITICAL VULNS
EOF

          # Top vulns
          cat results/*/nuclei.jsonl 2>/dev/null | \
            jq -r '.info.severity + "|" + .info.name + "|" + .info.host' 2>/dev/null | \
            sort | uniq -c | sort -nr | head -15 >> stealth-report/STEALTH-RECON.md

          # Live hosts
          echo -e "\n## LIVE HOSTS" >> stealth-report/STEALTH-RECON.md
          cat results/*/live.json 2>/dev/null | \
            jq -r 'select(.status_code<400) | "- \$.url) [\$.status_code)] \$.title)"' | \
            head -20 >> stealth-report/STEALTH-RECON.md

          # Arquivo único
          tar -czf stealth-report-${DOMAIN}-${SCAN_ID}.tar.gz \
            stealth-report/ results/ --exclude='*.tar.gz'

      - uses: actions/upload-artifact@v4
        with:
          name: STEALTH-REPORT-${{ needs.setup.outputs.domain }}
          path: |
            stealth-report/
            stealth-report-*.tar.gz
          retention-days: 14
